<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CCS Sit-in Monitoring System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <a href="{{ url_for('login') }}" class="back-btn">← Back</a>

    <div class="reg-wrapper">
        <div class="reg-card">

            <div class="reg-form-side">
                <h2 class="reg-title">Sign up</h2>
                <p class="reg-subtitle">Create your student account</p>

                {% if error %}
                    <div class="alert-error">⚠ {{ error }}</div>
                {% endif %}

                {% if success %}
                    <div class="alert-success">
                        ✓ {{ success }} <a href="{{ url_for('login') }}">Login here</a>.
                    </div>
                {% endif %}

                <form method="POST" action="{{ url_for('register') }}">

                    <div class="field-wrap">
                        <label class="field-label">ID Number</label>
                        <input type="text" name="id_number" placeholder="e.g. 2024-00001" required>
                    </div>

                    <div class="field-row">
                        <div class="field-wrap">
                            <label class="field-label">Last Name</label>
                            <input type="text" name="last_name" placeholder="Last name" required>
                        </div>
                        <div class="field-wrap">
                            <label class="field-label">First Name</label>
                            <input type="text" name="first_name" placeholder="First name" required>
                        </div>
                    </div>

                    <div class="field-wrap">
                        <label class="field-label">Middle Name <span class="optional">(optional)</span></label>
                        <input type="text" name="middle_name" placeholder="Middle name">
                    </div>

                    <!-- ✅ FIXED: Course AND Year Level side by side -->
                    <div class="field-row">
                        <div class="field-wrap">
                            <label class="field-label">Course</label>
                            <select name="course" required>
                                <option value="" disabled selected>Select course</option>
                                <optgroup label="── Computer Studies ──">
                                    <option value="BSIT">BSIT</option>
                                    <option value="BSCS">BSCS</option>
                                    <option value="BSIS">BSIS</option>
                                    <option value="ACT">ACT</option>
                                </optgroup>
                                <optgroup label="── Engineering ──">
                                    <option value="BSCE">BSCE</option>
                                    <option value="BSEE">BSEE</option>
                                    <option value="BSME">BSME</option>
                                    <option value="BSEcE">BSEcE</option>
                                    <option value="BSIE">BSIE</option>
                                </optgroup>
                                <optgroup label="── Business & Accountancy ──">
                                    <option value="BSBA">BSBA</option>
                                    <option value="BSA">BSA</option>
                                    <option value="BSMA">BSMA</option>
                                </optgroup>
                                <optgroup label="── Education ──">
                                    <option value="BEED">BEED</option>
                                    <option value="BSED">BSED</option>
                                </optgroup>
                                <optgroup label="── Arts & Sciences ──">
                                    <option value="AB-PolSci">AB Political Science</option>
                                    <option value="AB-English">AB English</option>
                                    <option value="BSP">BS Psychology</option>
                                    <option value="BSBio">BS Biology</option>
                                </optgroup>
                                <optgroup label="── Nursing ──">
                                    <option value="BSN">BSN</option>
                                </optgroup>
                                <optgroup label="── Architecture ──">
                                    <option value="BSArch">BSArch</option>
                                </optgroup>
                                <optgroup label="── Tourism & Hospitality ──">
                                    <option value="BSTM">BSTM</option>
                                    <option value="BSHM">BSHM</option>
                                </optgroup>
                            </select>
                        </div>
                        <div class="field-wrap">
                            <label class="field-label">Year Level</label>
                            <select name="course_level" required>
                                <option value="" disabled selected>Select year</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                            </select>
                        </div>
                    </div>

                    <div class="field-wrap">
                        <label class="field-label">Email</label>
                        <input type="email" name="email" placeholder="your@email.com" required>
                    </div>

                    <div class="field-row">
                        <div class="field-wrap">
                            <label class="field-label">Password</label>
                            <input type="password" name="password" placeholder="Min. 6 characters" required>
                        </div>
                        <div class="field-wrap">
                            <label class="field-label">Repeat Password</label>
                            <input type="password" name="repeat_password" placeholder="Repeat password" required>
                        </div>
                    </div>

                    <div class="field-wrap">
                        <label class="field-label">Address</label>
                        <input type="text" name="address" placeholder="Your address">
                    </div>

                    <button type="submit" class="btn-register">Create Account</button>

                    <p class="login-link">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>

                </form>
            </div>

            <div class="reg-img-side">
                <img src="{{ url_for('static', filename='signup.avif') }}" alt="Sign Up Illustration" class="reg-img-top">
                <img src="{{ url_for('static', filename='UC.webp') }}" alt="CCS Logo" class="reg-img-bottom">
            </div>

        </div>
    </div>

</body>
</html>
